<html lang="en"><head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Spendly AI Assistant</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#17cf54",
                        "background-light": "#f6f8f6",
                        "background-dark": "#112116",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .active-icon {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100">
<div class="relative flex h-screen w-full flex-col overflow-hidden max-w-md mx-auto border-x border-primary/10">
    <!-- Header -->
    <header class="flex items-center bg-background-light dark:bg-background-dark p-4 border-b border-primary/10 justify-between sticky top-0 z-10">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-primary flex items-center justify-center text-background-light">
                <span class="material-symbols-outlined active-icon">auto_awesome</span>
            </div>
            <div>
                <h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight">Spendly AI</h2>
                <p class="text-xs text-primary font-medium">Online &amp; Ready to help</p>
            </div>
        </div>
        <button class="flex items-center justify-center rounded-lg h-10 w-10 hover:bg-primary/10 text-slate-900 dark:text-slate-100 transition-colors">
            <span class="material-symbols-outlined">settings</span>
        </button>
    </header>
    <!-- Chat Area -->
    <main class="flex-1 overflow-y-auto p-4 space-y-6 scroll-smooth" id="chat-box">
        <div class="text-center py-2">
            <span class="text-xs font-bold uppercase tracking-wider text-slate-400 dark:text-slate-500">Today</span>
        </div>
    </main>

    <!-- Quick Suggestions -->
    <div class="flex gap-2 overflow-x-auto pb-2 no-scrollbar">
        <button class="whitespace-nowrap px-4 py-2 rounded-full border border-primary/20 bg-primary/5 text-xs font-medium text-primary hover:bg-primary/10 transition-colors">Show transactions</button>
        <button class="whitespace-nowrap px-4 py-2 rounded-full border border-primary/20 bg-primary/5 text-xs font-medium text-primary hover:bg-primary/10 transition-colors">Compare to last month</button>
        <button class="whitespace-nowrap px-4 py-2 rounded-full border border-primary/20 bg-primary/5 text-xs font-medium text-primary hover:bg-primary/10 transition-colors">Update dining budget</button>
    </div>
    <!-- Input Area -->
    <div class="p-4 bg-background-light dark:bg-background-dark border-t border-primary/10">
        <div class="relative flex items-center gap-2">
            <div class="relative flex-1">
                <input class="w-full bg-white dark:bg-slate-800 border border-primary/10 rounded-xl px-4 py-3 pr-12 text-sm focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all text-slate-900 dark:text-slate-100" id="userInput" placeholder="Ask about your finances..." type="text"/>
                <button id="sendBtn" class="absolute right-2 top-1/2 -translate-y-1/2 p-1.5 text-slate-400 hover:text-primary transition-colors">
                    <span class="material-symbols-outlined">mic</span>
                </button>
            </div>
            <button class="bg-primary hover:bg-primary/90 text-background-light h-11 w-11 rounded-xl flex items-center justify-center transition-colors shadow-lg shadow-primary/20">
                <span class="material-symbols-outlined">send</span>
            </button>
        </div>
    </div>
    <!-- Bottom Navigation -->
    <nav class="flex gap-2 border-t border-primary/10 bg-background-light dark:bg-background-dark px-4 pb-6 pt-2">
        <a class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors" href="#">
            <span class="material-symbols-outlined">home</span>
            <p class="text-[10px] font-medium leading-normal">Home</p>
        </a>
        <a class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors" href="#">
            <span class="material-symbols-outlined">credit_card</span>
            <p class="text-[10px] font-medium leading-normal">Subscriptions</p>
        </a>
        <a class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors" href="#">
            <span class="material-symbols-outlined">track_changes</span>
            <p class="text-[10px] font-medium leading-normal">Goals</p>
        </a>
        <a class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors" href="#">
            <span class="material-symbols-outlined">pie_chart</span>
            <p class="text-[10px] font-medium leading-normal">Budgets</p>
        </a>
        <a class="flex flex-1 flex-col items-center justify-end gap-1 text-primary" href="#">
            <span class="material-symbols-outlined active-icon">auto_awesome</span>
            <p class="text-[10px] font-bold leading-normal">AI</p>
        </a>
    </nav>
</div>
</body></html>
<script type="module" src="IO.js"></script>
<script type="module" src="botones.js"></script>
